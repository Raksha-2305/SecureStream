<!DOCTYPE html>
<html>
<head>
    <title>Monitor</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(135deg, #5f2c82, #49a09d, #6a11cb);
            height: 100vh;
            padding-top: 100px;
        }

        input {
            padding: 10px;
            border-radius: 20px;
            border: none;
            width: 250px;
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            border-radius: 20px;
            border: none;
            background: #0072ff;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>📡 Track Videos Across Internet</h2>

<form action="/monitor" method="post">
    <input type="text" name="keyword" placeholder="Enter hashtag or keyword" required>
    <br>
    <button type="submit">Search</button>
</form>

</body>
</html>
