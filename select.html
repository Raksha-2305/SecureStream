<!DOCTYPE html>
<html>
<head>
    <title>Select Option</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #5f2c82, #49a09d, #6a11cb);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🔥 REMOVE UNDERLINE + LINK COLOR */
        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 {
            margin-bottom: 30px;
            color: #333;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .upload {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
        }

        .detect {
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            color: white;
        }

        .monitor {
            background: linear-gradient(90deg, #43e97b, #38f9d7);
            color: black;
        }

        .btn:hover {
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Choose What You Want</h2>

    <a href="/upload_page">
        <button class="btn upload">📤 Upload Video</button>
    </a>

    <a href="/detect_page">
        <button class="btn detect">🔍 Detect Watermark</button>
    </a>

    <a href="/monitor_page">
        <button class="btn monitor">📡 Monitor Videos</button>
    </a>

</div>

</body>
</html>
