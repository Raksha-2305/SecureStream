<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #5f2c82, #49a09d, #6a11cb);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        h2 {
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin: 15px;
            width: 320px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        p {
            margin: 8px 0;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .no-result {
            margin-top: 30px;
            font-size: 18px;
        }

    </style>
</head>

<body>

<h2>🔍 Found videos for "{{keyword}}"</h2>

<div class="container">

{% if videos %}
    {% for video in videos %}
    <div class="box">
        <p><strong>🎥 {{video}}</strong></p>
        <p>📍 Platform: YouTube</p>

        <form action="/check_video" method="post">
            <input type="hidden" name="video" value="{{video}}">
            <button type="submit">Check Ownership</button>
        </form>
    </div>
    {% endfor %}
{% else %}
    <p class="no-result">No videos found</p>
{% endif %}

<h3>🤖 AI Suggested Hashtags</h3>
<p>{{ hashtags }}</p>

</div>

</body>
</html>
