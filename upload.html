<!DOCTYPE html>
<html>
<head>
    <title>Upload Video</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #5f2c82, #49a09d, #6a11cb);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 20px;
        }

        .file-box {
            padding: 10px;
            border-radius: 10px;
            background: #f5f5f5;
            display: inline-block;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
        }

        .loader {
            display: none;
            margin-top: 15px;
        }

        .spinner {
            border: 5px solid #eee;
            border-top: 5px solid #0072ff;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Upload Video</h1>
    <p>Secure your content with invisible watermark</p>

    <form action="/upload" method="post" enctype="multipart/form-data" onsubmit="showLoader()">
        
        <div class="file-box">
            <input type="file" name="video" required>
        </div>

        <br>

        <button type="submit">Upload & Secure</button>

        <div class="loader" id="loader">
            <p>Processing...</p>
            <div class="spinner"></div>
        </div>

    </form>

</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
